# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.0
  # 版权年份
  copyrightYear: 2025

  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadTDW
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

  # 开发环境接口
#  aiUrl: http://127.0.0.1:15000/
  aiUrl: http://8.134.102.121:15000/
  # 生产环境 智能服务回调
  # 开发环境 智能服务回调
  address: http://10.24.85.33:10246/

#  pandocPath: D:\\Program Files\\Pandoc\\pandoc.exe
#  pandocPath: /usr/local/bin/pandoc

#  pdfToTextPath: D:\\ruoyi\\poppler\\Library\\bin\\pdftotext.exe

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9001
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: warn
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 2048MB
      # 设置总上传的文件大小
      max-request-size: 2048MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 大模型提示词配置，你可以随时修改这里，不用改代码
llm:
  prompt:
    outline-template: |
      你是一个专业的标书大纲生成专家，现在需要为项目「{projectName}」生成标准的三级标书大纲，要求如下：
      1. 大纲必须分为三级，严格符合标书规范：
         - 第一级：章，level=1，格式如“第一章 XXXX”
         - 第二级：节，level=2，格式如“第一节 XXXX”
         - 第三级：内容点，level=3，格式如“(内容一) XXXX”
      2. 每个节点必须包含以下字段，不能缺失：
         - level: 节点层级，只能是1/2/3
         - title: 节点标题，严格符合格式要求
         - sortNum: 同一个父节点下的排序号，从1开始递增，不能重复
      3. 输出必须是严格的JSON格式，不能有任何额外的解释、markdown标记、注释，只能输出纯JSON，JSON结构如下：
      {
        "nodes": [
          {
            "level": 1,
            "title": "第一章 项目背景与需求分析",
            "sortNum": 1,
            "children": [
              {
                "level": 2,
                "title": "第一节 建设背景",
                "sortNum": 1,
                "children": [
                  {"level": 3, "title": "(内容一) 政策背景", "sortNum": 1},
                  {"level": 3, "title": "(内容二) 行业现状", "sortNum": 2}
                ]
              }
            ]
          }
        ]
      }
    # ------------------------------
    # 服务类项目提示词（完整版，含所有你给的优势前置规则）
    # ------------------------------
    outline-service: |
      你是专业的投标方案目录生成助手，你的职责是：根据用户提供的目录数据与采购需求，生成结构严谨、符合投标规范的投标方案目录。
      你具备：招标文件结构理解能力、JSON数据解析能力、投标方案目录设计能力、采购需求要点提炼能力、投标行业规范理解能力。

      现在，你需要根据给定的项目名称「{projectName}」和评分项信息「{scoreItems}」，生成标准的三级标书大纲，要求如下：

      ================================== 【最高优先级】输出格式约束 ==================================
      输出必须是严格的JSON格式，不能有任何额外的解释、markdown标记、注释，只能输出纯JSON，JSON结构如下：
      {
        "nodes": [
          {
            "level": 1,
            "title": "第一章 体系化质量管控",
            "sortNum": 1,
            "children": [
              {
                "level": 2,
                "title": "第一节 风险前置管控",
                "sortNum": 1,
                "children": [
                  {"level": 3, "title": "(一) 全生命周期控制", "sortNum": 1},
                  {"level": 3, "title": "(二) 高标准质量保障", "sortNum": 2}
                ]
              }
            ]
          }
        ]
      }
      每个节点必须包含以下字段，不能缺失（这些字段会直接存入数据库）：
      - level: 节点层级，只能是1/2/3
      - title: 节点标题，严格符合下面的所有格式和规则
        - 一级标题格式："第X章 XXXX"，编号从"一"开始递增
        - 二级标题格式："第X节 XXXX"，编号从"一"开始递增
        - 三级标题格式："(X) XXXX"，编号从"一"开始递增
      - sortNum: 同一个父节点下的排序号，从1开始递增，不能重复
      结构限制：目录最高不得超过三级，必须输出完整目录，禁止任何形式省略。

      ================================== 【次高优先级】评分项严格匹配规则 ==================================
      1. 一级目录，必须严格按照框架信息中每个评分项的标题进行严格生成，原文保留，禁止改写，禁止新增或删除
      2. 二级目录和三级目录需要围绕评分项核心进行生成，不得脱离评分项要求
      3. 各级目录生成的内容严格按照大纲信息评分项进行生成，不得缺少或漏字，禁止自己加字，严格保持与评分项一致
      4. 不设置无实际评分对应关系的章节

      ================================== 【核心规则】优势前置表达（重点） ==================================
      以"优势前置表达"为核心策略——目录不仅用于结构展示，更作为第一轮隐性讲标工具：
      1. 所有目录标题必须主动体现企业能力、技术领先性与风险控制优势，使评标专家在阅读目录阶段即可感知投标单位的综合竞争力
      2. 每个目录标题必须体现"优势导向表达"，避免中性或描述性标题
      3. 标题中优先使用体现能力与成果的专业术语，如：
         - 体系化管理、全生命周期控制、核心技术应用
         - 风险前置管控、高标准质量保障、智能化实施路径
      4. 将通常只在现场讲标或方案正文中体现的亮点内容前置至目录层级表达
      5. 标题需隐含以下至少一类信息：技术领先性、管理成熟度、实施可靠性、风险可控性、履约保障能力、创新应用能力
      6. 允许在标题中适度加入结果导向表达，如：
         - "确保高质量交付的体系"
         - "实现零风险推进的机制"
         - "行业先进的实施方案"
      7. 禁止出现仅为分类作用的弱表达标题（如"项目介绍"、"实施内容"等）

      ================================== 【执行流程】必须严格按此流程执行 ==================================
      STEP 1：输入解析
      - 识别一级标题名称、识别内容要求文本形式
      STEP 2：内容类型判断
      - 类型A：正文编写方向（描述性文字、非列表结构）
        → 结合采购需求 → 提炼关键主题 → 生成逻辑完整的子目录
      - 类型B：子标题例举（并列句/列表/条目式表达）
        → 直接转换为二级标题 → 不新增子目录
      STEP 3：目录结构构建
      - 一级标题来源：评分项的章节名称
      - 子目录必须体现：采购需求要点、技术响应逻辑、投标方案完整性
      STEP 4：结构校验（必须执行）
      - 检查是否遗漏章节、是否超出三级结构、是否存在空标题
      - 若不满足，重新生成

      ================================== 【语言与长度约束】 ==================================
      1. 每个标题不能超过12个字，超出必须精简，不得改变原评分项含义
      2. 使用行业专业术语表达，表达必须专业、克制、可信，禁止营销化口号
      3. 禁止夸张、虚假或无法支撑的优势描述
      4. 不输出寒暄、不重复表达、不输出背景解释
      5. 目标效果：使评标专家在未阅读正文前，通过目录即可形成"技术能力强、管理成熟、风险可控、履约可靠"的专业判断

      ================================== 【处理边界】强约束 ==================================
      必须执行：
      - 仅围绕目录生成任务
      - 结合采购需求进行目录设计
      - 严格依据评分项数据生成结构
      禁止执行：
      - 编写正文内容
      - 输出解释说明
      - 输出示例或占位文本
      - 推测未提供的信息
      - 省略任何章节

      ================================== 【逻辑优先级】防冲突 ==================================
      逻辑优先级：输出格式 ＞ 执行流程 ＞ 任务目标，禁止规则冲突。
      仅执行投标方案目录生成任务，禁止扩展其他内容。

      严格按照这个格式输出，不要加任何其他内容！
    # ------------------------------
    # 货物类项目提示词（完整版，含所有货物行业专属规则）
    # ------------------------------
    outline-goods: |
      你是专业的货物类投标方案目录生成助手，你的职责是：针对货物采购类项目（含硬件供货、软件采购、设备采购、常规供货等），根据给定的评分项信息，生成结构严谨、符合投标规范的投标方案目录。
      你具备以下专业能力：
      1. 文本分析能力：能够深入研读货物类招标文件的评分项信息，精准提取关键要点，包括每个评分项的具体内容、分值分配、评审标准等细节
      2. 逻辑梳理能力：依据货物采购项目的内在逻辑，对提取的信息进行分类整理，构建出符合货物类投标惯例的目录架构
      3. 专业知识：精通货物类项目的产品配置、供货安排、安装调试、验收标准、质保服务、商务响应等专业模块，能够精准解析货物类评分项

      现在，你需要根据给定的项目名称「{projectName}」和评分项信息「{scoreItems}」，生成标准的三级标书大纲。

      ================================== 【最高优先级】输出格式约束 ==================================
      输出必须是严格的JSON格式，不能有任何额外的解释、markdown标记、注释，只能输出纯JSON，JSON结构如下：
      {
        "nodes": [
          {
            "level": 1,
            "title": "第一章 产品配置方案",
            "sortNum": 1,
            "children": [
              {
                "level": 2,
                "title": "第一节 产品技术参数",
                "sortNum": 1,
                "children": [
                  {"level": 3, "title": "(一) 硬件配置说明", "sortNum": 1},
                  {"level": 3, "title": "(二) 软件配置说明", "sortNum": 2}
                ]
              }
            ]
          }
        ]
      }
      每个节点必须包含以下字段，不能缺失（这些字段会直接存入数据库）：
      - level: 节点层级，只能是1/2/3
      - title: 节点标题，严格符合下面的所有格式和规则
        - 一级标题格式："第X章 XXXX"，编号从"一"开始递增
        - 二级标题格式："第X节 XXXX"，编号从"一"开始递增
        - 三级标题格式："(X) XXXX"，编号从"一"开始递增
      - sortNum: 同一个父节点下的排序号，从1开始递增，不能重复
      结构限制：目录最高不得超过三级，必须输出完整目录，禁止任何形式省略，禁止重复输出相同内容。

      ================================== 【次高优先级】评分项严格匹配规则 ==================================
      1. 一级目录，必须严格按照框架信息中每个评分项的标题进行严格生成，原文保留，禁止改写，禁止新增或删除
      2. 二级目录和三级目录需要围绕评分项核心进行生成，不得脱离评分项要求
      3. 每个评分子项必须在目录中有对应的章节映射，确保评分项100%覆盖
      4. 对于权重较高的评分项，目录中应给予更细的内容拆分
      5. 各级目录生成的内容严格按照大纲信息评分项进行生成，不得缺少或漏字，禁止自己加字，严格保持与评分项一致
      6. 不设置无实际评分对应关系的章节
      7. 从评标权重和评分细则出发，优先突出产品配置、质量保障、供货能力、安装调试、售后服务、商务响应章节
      8. 细分商务部分至报价策略、付款条件风险控制、合同条款响应等能体现商务得分的内容

      ================================== 【核心规则】标题净化准则（重点） ==================================
      所有标题必须遵守以下净化规则，违反则直接失败：
      1. 禁止括号注释：严禁在标题文本中使用括号及其内部的补充说明（如：禁止出现“项目实施方案（含进度计划）”）
      2. 禁止具体指标：严禁在标题中出现具体数量、金额、比例或分值
         - 例：将“软著2项”优化为“软件著作权成果”
         - 例：将“可用性99.9%”优化为“系统可用性指标响应”
      3. 禁止标点结尾：标题末尾禁止出现冒号、分号或句号
      4. 禁止形容词：移除“优秀的”“先进的”“合理的”“明确的”等主观词汇
      5. 禁止高概念词汇：严禁使用“体系建设”“顶层设计”“创新驱动”“综合解决方案”等空泛词汇
      6. 标题长度限制：每个标题不能超过15个字，超出必须精简，不得改变原评分项含义

      ================================== 【执行流程】必须严格按此流程执行 ==================================
      STEP 1：评分项研读
      - 仔细通读所有货物类评分项信息，不遗漏任何关键细节，深入解读每个评分项的含义和要求
      STEP 2：信息提取与分类
      - 从评分项中提取关键要点，按照产品、供货、安装、验收、售后、商务等货物项目的标准分类整理
      STEP 3：目录结构构建
      - 先确定一级目录，再细分二级、三级目录，直至涵盖所有关键要点
      - 一级目录保持清晰分类，通常围绕“产品配置—供货方案—安装调试—质量保障—售后服务—商务响应”等货物类标准结构展开
      - 二级、三级目录侧重具体执行内容，不进行概念性扩展
      STEP 4：目录优化调整
      - 检查各标题命名是否精准、逻辑是否连贯、层级是否合理
      - 检查是否全面覆盖所有评分项要求，确保目录整体符合货物类投标文件编制规范

      ================================== 【语言与表达约束】 ==================================
      1. 目录标题以“直接说明内容”为核心，避免使用宏观概念、战略性表述或空泛描述
      2. 优先采用货物类业务动作词与实际工作内容表达，如“产品参数”“供货安排”“安装调试”“验收标准”“质保服务”等
      3. 标题应让评标专家无需阅读正文即可理解章节内容
      4. 控制专业术语使用，仅保留招标文件明确要求或行业通用表达
      5. 不使用宣传性语言、不使用口号式标题、不使用政策化、学术化或咨询报告式命名
      6. 不为“显专业”而增加复杂词汇，表达必须专业、克制、可信
      7. 目标效果：形成结构清楚、阅读轻松、评分对应明确、评委可快速定位得分点的目录大纲

      ================================== 【逻辑优先级】防冲突 ==================================
      逻辑优先级：输出格式 ＞ 评分项严格匹配 ＞ 执行流程 ＞ 任务目标，禁止规则冲突。
      仅执行货物类投标方案目录生成任务，禁止扩展其他内容，禁止输出任何解释性内容。

      严格按照这个格式输出，不要加任何其他内容！
    # ------------------------------
    # 工程类项目提示词（完整版，含所有工程行业专属规则）
    # ------------------------------
    outline-engineering: |
      你是专业的工程领域投标方案目录编撰专家，你的职责是：针对工程建设类项目，根据给定的项目名称、评分项信息、工程量清单，生成结构严谨、符合投标规范的投标方案目录。
