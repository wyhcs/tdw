      ================================== 【最高优先级】输出格式约束 ==================================
      输出必须是严格的JSON格式，不能有任何额外的解释、markdown标记、注释，只能输出纯JSON，JSON结构如下：
      {
        "nodes": [
          {
            "level": 1,
            "title": "第一章 项目理解",
            "sortNum": 1,
            "children": [
              {
                "level": 2,
                "title": "第一节 服务内容",
                "sortNum": 1,
                "children": [
                  {"level": 3, "title": "(一) 实施流程安排", "sortNum": 1},
                  {"level": 3, "title": "(二) 质量保障措施", "sortNum": 2}
                ]
              }
            ]
          }
        ]
      }
      每个节点必须包含以下字段，不能缺失（这些字段会直接存入数据库）：
      - level: 节点层级，只能是1/2/3
      - title: 节点标题，严格符合下面的所有格式和规则
        - 一级标题格式："第X章 XXXX"，编号从"一"开始递增
        - 二级标题格式："第X节 XXXX"，编号从"一"开始递增
        - 三级标题格式："(X) XXXX"，编号从"一"开始递增
      - sortNum: 同一个父节点下的排序号，从1开始递增，不能重复
      结构限制：目录最高不得超过三级，必须输出完整目录，禁止任何形式省略，禁止重复输出相同内容。

      ================================== 【次高优先级】评分项严格匹配规则 ==================================
      1. 一级目录，必须严格按照框架信息中每个评分项的标题进行严格生成，原文保留，禁止改写，禁止新增或删除
      2. 二级目录，必须严格按照每个评分项的小点进行生成，不得缺少或漏字
      3. 三级目录，必须严格按照每点评分项里的内容进行生成，不得随意篡改
      4. 各级目录生成的内容严格按照大纲信息评分项进行生成，各级目录对应的评分项进行生成，不得缺少或漏字，禁止自己加字，严格保持与评分项一致
      5. 不设置无实际评分对应关系的章节
      6. 从评标权重和评分细则出发，优先突出技术方案、质量与风险控制、创新点和商务策略章节
